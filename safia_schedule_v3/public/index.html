<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safia Schedule v5</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="appShell">
    <aside class="sidebar">
      <div class="brand"><span class="brandLogo">🍰</span><div><b>Safia Schedule</b><small>Сергели · график</small></div></div>
      <button class="nav active" data-page="schedule">📅 <span>График</span></button>
      <button class="nav" data-page="dayoffs">🏖 <span>Выходные</span></button>
      <button class="nav" data-page="employees">👥 <span>Сотрудники</span></button>
      <button class="nav" data-page="skills">⭐ <span>Навыки</span></button>
      <button class="nav admin-only" data-page="staffing">📊 <span>Штатка</span></button>
      <button class="nav admin-only" data-page="history">📜 <span>История</span></button>
      <button class="nav" data-page="dashboard">✨ <span>Помощник</span></button>
      <div class="roleBox">
        <label>Роль</label>
        <select id="roleSelect"><option value="admin">Админ</option><option value="manager">Менеджер</option></select>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="eyebrow">Safia Schedule v5</div>
          <h1 id="pageTitle">График недели</h1>
          <p id="weekTitle">Неделя</p>
        </div>
        <div class="topActions">
          <button id="prevWeekBtn" class="iconBtn">←</button>
          <select id="weekSelect"></select>
          <button id="nextWeekBtn">Следующая неделя</button>
          <button id="excelBtn" class="darkBtn">Excel</button>
        </div>
      </header>

      <section id="schedule" class="page active"></section>
      <section id="dayoffs" class="page"></section>
      <section id="employees" class="page"></section>
      <section id="skills" class="page"></section>
      <section id="staffing" class="page"></section>
      <section id="history" class="page"></section>
      <section id="dashboard" class="page"></section>
    </main>
  </div>
  <aside id="drawer" class="drawer"></aside>
  <div id="toast" class="toast"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="/js/firebase.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
