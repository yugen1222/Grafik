<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safia Schedule v3</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">🍰 <span>Safia Schedule</span></div>
      <button class="nav active" data-page="dashboard">Главная</button>
      <button class="nav" data-page="schedule">График</button>
      <button class="nav" data-page="dayoffs">Выходные</button>
      <button class="nav" data-page="employees">Сотрудники</button>
      <button class="nav admin-only" data-page="staffing">Штатка</button>
      <button class="nav admin-only" data-page="history">История</button>
      <div class="roleBox">
        <label>Роль</label>
        <select id="roleSelect">
          <option value="admin">Админ</option>
          <option value="manager">Менеджер</option>
        </select>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Главная</h1>
          <p id="weekTitle">Неделя</p>
        </div>
        <div class="topActions">
          <select id="weekSelect"></select>
          <button id="prevWeekBtn">←</button>
          <button id="nextWeekBtn">Следующая неделя</button>
          <button id="excelBtn">Скачать Excel</button>
        </div>
      </header>

      <section id="dashboard" class="page active"></section>
      <section id="schedule" class="page"></section>
      <section id="dayoffs" class="page"></section>
      <section id="employees" class="page"></section>
      <section id="staffing" class="page"></section>
      <section id="history" class="page"></section>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/js/app.js"></script>
</body>
</html>
