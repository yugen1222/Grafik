<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safia Schedule</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">S</div><div><b>Safia Schedule</b><span>Сергели</span></div></div>
      <button class="nav active" data-page="dashboard">🏠 Главная</button>
      <button class="nav" data-page="schedule">📅 График</button>
      <button class="nav" data-page="dayoffs">🌙 Выходные</button>
      <button class="nav" data-page="employees">👥 Сотрудники</button>
      <button class="nav admin-only" data-page="staffing">📊 Штатка</button>
      <button class="nav" data-page="history">📜 История</button>
      <button class="nav" data-page="settings">⚙️ Настройки</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Главная</h1>
          <p id="weekLabel">Неделя</p>
        </div>
        <div class="top-actions">
          <select id="roleSelect"><option value="admin">Админ</option><option value="manager">Менеджер</option></select>
          <select id="weekSelect"></select>
          <button id="newWeekBtn">Следующая неделя</button>
          <button id="exportBtn">Скачать Excel</button>
        </div>
      </header>

      <section id="dashboard" class="page active">
        <div class="cards" id="summaryCards"></div>
        <div class="panel"><h2>Проблемы по штатке</h2><div id="problemList" class="problem-list"></div></div>
      </section>

      <section id="schedule" class="page">
        <div class="toolbar">
          <select id="categorySelect"></select>
          <select id="shiftViewSelect"><option value="all">Все смены</option><option value="1">1 смена</option><option value="2">2 смена</option><option value="3">3 смена</option></select>
          <select id="daySelect"></select>
          <button id="saveSnapshotBtn">Сохранить в историю</button>
        </div>
        <div id="scheduleBoard" class="board"></div>
      </section>

      <section id="dayoffs" class="page">
        <div class="panel"><h2>Поставить выходные</h2><p>Выбери несколько сотрудников и несколько дат.</p>
          <div class="filters"><select id="dayoffCategoryFilter"><option value="all">Все категории</option></select><label><input type="checkbox" id="showOnlyDayoffs"> Только выходные</label></div>
          <h3>Сотрудники</h3><div id="dayoffEmployees" class="check-grid"></div>
          <h3>Даты</h3><div id="dayoffDates" class="check-grid"></div>
          <button id="applyDayoffsBtn">Поставить выходной</button>
        </div>
      </section>

      <section id="employees" class="page">
        <div class="panel"><h2>Добавить сотрудника</h2>
          <div class="form-row"><input id="empName" placeholder="ФИО"><select id="empPosition"><option>Продавец</option><option>Официант</option><option>Бариста</option><option>Техничка</option><option>Кассир</option><option>Морозильщик</option><option>Менеджер</option></select><select id="empShift"></select><button id="addEmployeeBtn">Добавить</button></div>
        </div>
        <div class="panel"><h2>Список сотрудников</h2><div id="employeeList" class="employee-list"></div></div>
      </section>

      <section id="staffing" class="page">
        <div class="panel"><h2>Штатка</h2>
          <div class="filters"><select id="staffCategoryFilter"></select><select id="staffShiftFilter"><option value="all">Все смены</option><option value="1">1 смена</option><option value="2">2 смена</option><option value="3">3 смена</option></select><select id="staffDayFilter"></select></div>
          <div id="staffingTable"></div>
        </div>
      </section>

      <section id="history" class="page"><div class="panel"><h2>История графиков</h2><div id="historyList"></div></div></section>
      <section id="settings" class="page"><div class="panel"><h2>Настройки</h2><button id="resetBtn" class="danger">Сбросить данные</button></div></section>
    </main>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
